topics:
  - id: agentic-ml
    name: "Awesome Agentic ML"
    description: "Autonomous AI systems that plan, execute, and iterate on machine learning workflows with minimal human intervention"
    grok_keywords: >-
      agentic ML, AutoML agents, autonomous machine learning,
      LLM ML engineering, ML workflow automation
    arxiv_feeds:
      - { name: "cs.AI", url: "https://rss.arxiv.org/rss/cs.AI" }
      - { name: "cs.LG", url: "https://rss.arxiv.org/rss/cs.LG" }
      - { name: "stat.ML", url: "https://rss.arxiv.org/rss/stat.ML" }
    inclusion_criteria:
      min_match: 3
      checklist:
        - "Goal-directed ML planning (selects or revises strategy for an ML objective)"
        - "Tool-using execution across ML lifecycle stages (data prep, feature engineering, model training, evaluation, experimentation)"
        - "Iterative feedback loop (uses metrics/errors/results to revise actions)"
        - "Empirical ML outcome (benchmark, competition result, ablation, or measurable improvement)"
    exclude:
      - "Generic web/desktop/coding agents without meaningful ML workflow contribution"
      - "Social-only announcements without a primary technical source (paper/repo/blog)"
      - "Stale resources unless there is a substantive new release/update in the recent window"
    max_entries_per_week: 5
    github_project: null

  - id: agentic-workflow-design
    name: "Awesome Agentic Workflow Design"
    description: "Architectural patterns, design principles, and engineering practices for building reliable, production-grade agentic systems"
    grok_keywords: >-
      agentic workflow design, agent architecture patterns, multi-agent orchestration,
      agentic systems engineering, LLM agent design patterns, production agents
    arxiv_feeds:
      - { name: "cs.AI", url: "https://rss.arxiv.org/rss/cs.AI" }
      - { name: "cs.SE", url: "https://rss.arxiv.org/rss/cs.SE" }
      - { name: "cs.MA", url: "https://rss.arxiv.org/rss/cs.MA" }
    inclusion_criteria:
      min_match: 3
      checklist:
        - "Architectural guidance for goal-directed agent systems (patterns, orchestration, state management)"
        - "Tool-use and execution design across agent lifecycle stages (planning, execution, feedback, recovery)"
        - "Iterative refinement practices (evaluation loops, human-in-the-loop, observability)"
        - "Empirical or practical grounding (case studies, benchmarks, production deployment evidence)"
    exclude:
      - "Generic LLM tutorials without agentic design focus"
      - "Social-only announcements without a primary technical source (paper/repo/blog)"
      - "Stale resources unless there is a substantive new release/update in the recent window"
    max_entries_per_week: 2
    github_project: null

  - id: top-claude-plugins
    name: "Top Claude Plugins"
    description: "High-signal Claude plugins, MCP servers, and integrations that meaningfully extend Claude's capabilities in real workflows"
    grok_keywords: >-
      Claude plugins, MCP server, Model Context Protocol, Claude integrations,
      Claude extensions, Claude tool use, Claude MCP
    arxiv_feeds:
      - { name: "cs.AI", url: "https://rss.arxiv.org/rss/cs.AI" }
      - { name: "cs.HC", url: "https://rss.arxiv.org/rss/cs.HC" }
      - { name: "cs.SE", url: "https://rss.arxiv.org/rss/cs.SE" }
    inclusion_criteria:
      min_match: 3
      checklist:
        - "Extends Claude with a concrete capability (tool use, data access, service integration, workflow automation)"
        - "Actively maintained with evidence of real-world usage (stars, downloads, community activity)"
        - "Built on a standard integration layer (MCP, Claude API tool use, Claude.ai plugin)"
        - "Documented with clear setup instructions and a defined use case"
    exclude:
      - "Toy or demo projects without production usage evidence"
      - "Plugins that duplicate a natively supported Claude capability"
      - "Abandoned repos (no activity in 6+ months) unless widely adopted"
    max_entries_per_week: 3
    github_project: null
